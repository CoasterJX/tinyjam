steps:
  - id: install
    name: 'node:22'
    entrypoint: npm
    args: ['install']

  - id: build
    name: 'node:22'
    entrypoint: npx
    args: ['tinyjam', 'example', '_output']

  - id: deploy-production
    name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', '_output', 'gs://tinyjam-production-${PROJECT_ID}']

options:
  logging: CLOUD_LOGGING_ONLY
