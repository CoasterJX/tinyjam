steps:
  # Install dependencies
  - name: 'node'
    entrypoint: 'npm'
    args: ['install']

  # Run tests
  - name: 'node'
    entrypoint: 'npm'
    args: ['test']

  # Build the site using the example directory
  - name: 'node'
    entrypoint: 'node'
    args: ['cli.js', 'example', 'output']

  # Deploy to GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gsutil'
    args: ['rsync', '-r', 'output', 'gs://tinyjam-site-ishamirulinda-sdlc']

options:
  logging: CLOUD_LOGGING_ONLY
