steps:
  # Step 1: Install dependencies
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Lint
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['run', 'pretest']

  # Step 3: Run tests
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['test']

  # Step 4: Build static site
  - name: 'node:22'
    entrypoint: 'npx'
    args: ['tinyjam', 'example/', 'output/']

  # Step 5: Deploy to Cloud Storage
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['storage', 'cp', '--recursive', 'output/*', 'gs://tinyjam-static-site-jianxiwang/']

options:
  logging: CLOUD_LOGGING_ONLY
