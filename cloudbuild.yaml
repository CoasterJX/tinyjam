steps:
  - id: install
    name: node:22
    entrypoint: npm
    args: ['install']

  - id: lint
    name: node:22
    entrypoint: npm
    args: ['run', 'pretest']
    waitFor: ['install']

  - id: test
    name: node:22
    entrypoint: npm
    args: ['test']
    waitFor: ['install']

  - id: build-site
    name: node:22
    entrypoint: npx
    args: ['tinyjam', 'example', '_site']
    waitFor: ['test']

  - id: deploy
    name: gcr.io/cloud-builders/gsutil
    args: ['-m', 'rsync', '-r', '-d', '_site', 'gs://${_BUCKET_NAME}']
    waitFor: ['build-site']

substitutions:
  _BUCKET_NAME: ''

options:
  logging: CLOUD_LOGGING_ONLY
