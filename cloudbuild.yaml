steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['test']
  - name: 'node:20'
    entrypoint: 'node'
    args: ['cli.js', 'example', 'dist']
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'dist/', 'gs://tinyjam-site-ishamirulinda-sdlc-site']

options:
  logging: CLOUD_LOGGING_ONLY
