steps:
  # Install dependencies and run tests
  - name: 'node:20'
    id: 'install_and_test'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:20'
    id: 'run_tests'
    entrypoint: 'npm'
    args: ['test']

  # Build the site
  - name: 'node:20'
    id: 'build_site'
    entrypoint: 'npx'
    args: ['tinyjam', 'example', 'output']

  # Deploy to GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy_to_gcs'
    entrypoint: 'gsutil'
    args: ['-m', 'rsync', '-r', 'output', 'gs://tinyjam-site-bucket']

options:
  logging: CLOUD_LOGGING_ONLY
