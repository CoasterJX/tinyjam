steps:
  # Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # Run tests
  - name: 'node:20'
    entrypoint: npm
    args: ['test']

  # Deploy to GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gsutil
    args: ['rsync', '-r', '-x', '.git/*', '.', 'gs://tinyjam-prod-ishamirulinda-sdlc']

options:
  logging: CLOUD_LOGGING_ONLY
