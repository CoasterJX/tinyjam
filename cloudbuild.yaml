steps:
  # Install dependencies
  - name: 'node:22'
    id: 'install'
    entrypoint: 'npm'
    args: ['install']

  # Lint and test
  - name: 'node:22'
    id: 'lint-and-test'
    entrypoint: 'npm'
    args: ['test']
    waitFor: ['install']

  # Build static site from example/ into _site/
  - name: 'node:22'
    id: 'build-site'
    entrypoint: 'node'
    args: ['cli.js', 'example', '_site']
    waitFor: ['lint-and-test']

  # Deploy to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'deploy-to-gcs'
    args: ['-m', 'rsync', '-r', '-d', '_site/', 'gs://${_SITE_BUCKET}']
    waitFor: ['build-site']

substitutions:
  _SITE_BUCKET: tinyjam-site-sdlc-test-project-jianxiwang

options:
  logging: CLOUD_LOGGING_ONLY
