steps:
  # Step 1: Install dependencies
  - name: 'node:22'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Lint
  - name: 'node:22'
    entrypoint: 'npx'
    args: ['eslint', '*.js', 'test/test.js']

  # Step 3: Test
  - name: 'node:22'
    entrypoint: 'node'
    args: ['test/test.js']

  # Step 4: Build static site
  - name: 'node:22'
    entrypoint: 'node'
    args: ['cli.js', 'example/', 'build_output/']

  # Step 5: Deploy to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'build_output/', 'gs://tinyjam-static-site-sdlc-test-project-jianxiwang']

options:
  logging: CLOUD_LOGGING_ONLY
