steps:
  # Install dependencies
  - name: "node:20"
    id: "install"
    entrypoint: "npm"
    args: ["install"]

  # Run Linter and Tests
  - name: "node:20"
    id: "test"
    entrypoint: "npm"
    args: ["test"]

  # Build the static site using the example directory
  - name: "node:20"
    id: "build"
    entrypoint: "node"
    args: ["cli.js", "example", "-o", "dist"]

  # Sync the 'dist' folder to the private GCS bucket
  - name: "gcr.io/cloud-builders/gsutil"
    id: "deploy"
    args: ["-m", "rsync", "-r", "-d", "dist/", "gs://sdlc-test-project-jianxiwang-tinyjam"]

options:
  logging: CLOUD_LOGGING_ONLY
